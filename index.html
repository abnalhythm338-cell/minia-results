<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minia University</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    color:#777;
    font-weight:300;
    margin-bottom:25px;
}

input[type=text],
input[type=password]{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
    font-size:16px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:15px 0;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    background:#61bdf4;
    border:none;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3ca9ea;
}

a{
    display:block;
    margin-top:15px;
    color:#4da8e8;
    text-decoration:none;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:13px;
}
</style>

</head>

<body>

<div class="login">

<h1>Minia University</h1>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<div class="options">
<label><input type="radio" name="type"> System User</label>
<label><input type="radio" name="type"> Staff</label>
<label><input type="radio" name="type" checked> Student</label>
</div>

<button>LOG IN</button>

<a href="#">Forget Password ?</a>

<div class="footer">
Powered by Ibn Alhaitham e-SIS software
</div>

</div>

</body>
</html>
